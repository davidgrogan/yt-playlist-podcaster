<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT Playlist Podcaster</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container { max-width: 760px; margin: 0 auto; }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #fff;
    }
    .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 32px; }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }

    label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 8px; }

    .input-row { display: flex; gap: 10px; }

    input[type="text"] {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: #ff4444; }

    button {
      background: #ff4444;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 10px 20px;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }
    button:hover { background: #e03333; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    #log-section { display: none; }

    .log-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .log-title { font-size: 0.85rem; color: #aaa; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .status-badge {
      font-size: 0.75rem;
      padding: 2px 10px;
      border-radius: 999px;
      font-weight: 600;
    }
    .status-badge.running { background: #1a3a1a; color: #4caf50; }
    .status-badge.done    { background: #1a2e3a; color: #4fc3f7; }
    .status-badge.error   { background: #3a1a1a; color: #ef5350; }

    #log {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #b0f0b0;
      font-family: 'SFMono-Regular', 'Menlo', 'Monaco', monospace;
      font-size: 0.78rem;
      height: 260px;
      overflow-y: auto;
      padding: 12px 14px;
      white-space: pre-wrap;
      word-break: break-all;
    }

    #feed-result {
      display: none;
      margin-top: 16px;
      background: #0d2a0d;
      border: 1px solid #2a5a2a;
      border-radius: 8px;
      padding: 14px 16px;
    }
    #feed-result .feed-label { font-size: 0.8rem; color: #888; margin-bottom: 6px; }
    .feed-url-row { display: flex; align-items: center; gap: 10px; }
    #feed-url {
      flex: 1;
      background: #111;
      border: 1px solid #2a5a2a;
      border-radius: 6px;
      color: #4fc3f7;
      font-family: monospace;
      font-size: 0.85rem;
      padding: 7px 12px;
    }
    .copy-btn {
      background: #1a3a1a;
      border: 1px solid #2a5a2a;
      border-radius: 6px;
      color: #4caf50;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 7px 14px;
      transition: background 0.15s;
    }
    .copy-btn:hover { background: #2a4a2a; }

    h2 { font-size: 1rem; font-weight: 600; color: #ccc; margin-bottom: 16px; }

    #playlists-list { list-style: none; }
    #playlists-list li {
      border-bottom: 1px solid #222;
      padding: 12px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    #playlists-list li:last-child { border-bottom: none; }

    .pl-info { flex: 1; min-width: 0; }
    .pl-title { font-size: 0.95rem; font-weight: 500; color: #e8e8e8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pl-meta { font-size: 0.78rem; color: #666; margin-top: 2px; }
    .pl-feed-url {
      font-family: 'SFMono-Regular', 'Menlo', monospace;
      font-size: 0.75rem;
      color: #4fc3f7;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      opacity: 0.8;
    }
    .pl-feed-url:hover { opacity: 1; text-decoration: underline; }

    .pl-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .pill-btn {
      background: #1a2e3a;
      border: 1px solid #2a4a5a;
      border-radius: 6px;
      color: #4fc3f7;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 5px 12px;
      text-decoration: none;
      transition: background 0.15s;
    }
    .pill-btn:hover { background: #223848; }

    .empty { color: #555; font-size: 0.9rem; text-align: center; padding: 24px 0; }
  </style>
</head>
<body>
<div class="container">
  <h1>YT Playlist Podcaster</h1>
  <p class="subtitle">Download a YouTube playlist as MP3s and subscribe in any podcast app.</p>

  <div class="card">
    <label for="url-input">YouTube Playlist URL</label>
    <div class="input-row">
      <input type="text" id="url-input" placeholder="https://www.youtube.com/playlist?list=..." />
      <button id="dl-btn" onclick="startDownload()">Download</button>
    </div>
  </div>

  <div class="card" id="log-section">
    <div class="log-header">
      <span class="log-title">Download Log</span>
      <span class="status-badge running" id="status-badge">Running</span>
    </div>
    <div id="log"></div>
    <div id="feed-result">
      <div class="feed-label">Your podcast RSS feed is ready:</div>
      <div class="feed-url-row">
        <input type="text" id="feed-url" readonly />
        <button class="copy-btn" onclick="copyFeed()">Copy</button>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Downloaded Playlists</h2>
    <ul id="playlists-list"><li class="empty">No playlists downloaded yet.</li></ul>
  </div>
</div>

<script>
  let currentEs = null;

  async function startDownload() {
    const url = document.getElementById('url-input').value.trim();
    if (!url) { alert('Please enter a playlist URL.'); return; }

    const btn = document.getElementById('dl-btn');
    btn.disabled = true;

    const logEl = document.getElementById('log');
    const logSection = document.getElementById('log-section');
    const badge = document.getElementById('status-badge');
    const feedResult = document.getElementById('feed-result');

    logEl.textContent = '';
    badge.textContent = 'Running';
    badge.className = 'status-badge running';
    feedResult.style.display = 'none';
    logSection.style.display = 'block';
    logSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    if (currentEs) currentEs.close();

    let res;
    try {
      res = await fetch('/download', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url }),
      });
    } catch (e) {
      appendLog('Error: ' + e.message);
      badge.textContent = 'Error';
      badge.className = 'status-badge error';
      btn.disabled = false;
      return;
    }

    const data = await res.json();
    if (!res.ok) {
      appendLog('Error: ' + (data.error || 'Unknown error'));
      badge.textContent = 'Error';
      badge.className = 'status-badge error';
      btn.disabled = false;
      return;
    }

    const { jobId, playlistId } = data;
    const feedUrl = `http://${location.hostname}:3000/feed/${playlistId}`;

    const es = new EventSource(`/status/${jobId}`);
    currentEs = es;

    es.onmessage = (e) => {
      const line = JSON.parse(e.data);
      if (line.startsWith('__EXIT__')) {
        const code = parseInt(line.slice(8));
        es.close();
        btn.disabled = false;
        if (code === 0) {
          badge.textContent = 'Done';
          badge.className = 'status-badge done';
          document.getElementById('feed-url').value = feedUrl;
          feedResult.style.display = 'block';
          loadPlaylists();
        } else {
          badge.textContent = 'Error';
          badge.className = 'status-badge error';
        }
        return;
      }
      appendLog(line);
    };

    es.onerror = () => {
      es.close();
      btn.disabled = false;
    };
  }

  function appendLog(line) {
    const logEl = document.getElementById('log');
    logEl.textContent += line + '\n';
    logEl.scrollTop = logEl.scrollHeight;
  }

  function copyFeed() {
    const val = document.getElementById('feed-url').value;
    navigator.clipboard.writeText(val).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 1500);
    });
  }

  async function loadPlaylists() {
    const res = await fetch('/playlists');
    const playlists = await res.json();
    const ul = document.getElementById('playlists-list');

    if (playlists.length === 0) {
      ul.innerHTML = '<li class="empty">No playlists downloaded yet.</li>';
      return;
    }

    ul.innerHTML = playlists.map(p => `
      <li>
        <div class="pl-info">
          <div class="pl-title">${escHtml(p.title)}</div>
          <div class="pl-meta">${p.mp3Count} episode${p.mp3Count !== 1 ? 's' : ''}</div>
          <div class="pl-feed-url" onclick="copyText('${escHtml(p.feedUrl)}', this)" title="Click to copy">${escHtml(p.feedUrl)}</div>
        </div>
        <div class="pl-actions">
          <a class="pill-btn" href="${escHtml(p.feedUrl)}" target="_blank">View Feed</a>
          <button class="pill-btn" onclick="copyText('${escHtml(p.feedUrl)}', this)">Copy RSS</button>
        </div>
      </li>
    `).join('');
  }

  function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = orig, 1500);
    });
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadPlaylists();
  // Refresh the playlist list every 5 seconds so it stays current
  // even if the page was loaded mid-download or after a server restart.
  setInterval(loadPlaylists, 5000);
</script>
</body>
</html>
